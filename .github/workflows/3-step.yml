name: Passo 3

on:
  workflow_dispatch:
  push:
    branches:
      - create-calc-app
    paths:
      - 'src/tests/*.js'

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-step.md"

jobs:
  find_exercise:
    name: Encontrar Issue do Exercício
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1

  check_step_work:
    name: Verificar trabalho do passo
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Obter templates de resposta
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Encontrar último comentário
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Atualizar comentário - verificando trabalho
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Detectar arquivo de testes da calculadora
        id: detect-test-file
        run: |
          if [ -f "src/tests/calculator.test.js" ]; then
            echo "path=src/tests/calculator.test.js" >> "$GITHUB_OUTPUT"
          elif [ -f "src/tests/calculator.tests.js" ]; then
            echo "path=src/tests/calculator.tests.js" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Expected src/tests/calculator.test.js or src/tests/calculator.tests.js but neither was found"
            exit 1
          fi

      - name: Verificar se o arquivo de testes tem teste de modulo
        id: check-modulo-test
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: ${{ steps.detect-test-file.outputs.path }}
          keyphrase: modulo

      - name: Verificar se o arquivo de testes tem teste de power
        id: check-power-test
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: ${{ steps.detect-test-file.outputs.path }}
          keyphrase: power

      - name: Verificar se o arquivo de testes tem teste de 'square root'
        id: check-sqrt-test
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: ${{ steps.detect-test-file.outputs.path }}
          keyphrase: 'square'

      - name: Atualizar comentário - resultados do passo
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 3
            results_table:
              - description: "Testes da calculadora tem teste de 'modulo'"
                passed: ${{ steps.check-modulo-test.outcome == 'success' }}
              - description: "Testes da calculadora tem teste de 'power'"
                passed: ${{ steps.check-power-test.outcome == 'success' }}
              - description: "Testes da calculadora tem teste de 'squareroot'"
                passed: ${{ steps.check-sqrt-test.outcome == 'success' }}

      - name: Falhar job se nem todas as verificações passaram
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Publicar conteúdo do próximo passo
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Obter templates de resposta
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Criar comentário - passo concluído
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 4

      - name: Criar comentário - adicionar conteúdo do passo
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_4_FILE }}

      - name: Criar comentário - monitorando progresso
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Desabilitar workflow atual e habilitar próximo
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Passo 4"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Passo 2

on:
  workflow_dispatch:
  push:
    branches:
      - create-calc-app
    paths:
      - 'src/*.js'

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

jobs:
  find_exercise:
    name: Encontrar Issue do Exercício
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1

  check_step_work:
    name: Verificar trabalho do passo
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Obter templates de resposta
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Encontrar último comentário
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Atualizar comentário - verificando trabalho
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Verificar se calculator.js tem função addition
        id: check-addition-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: addition

      - name: Verificar se calculator.js tem função subtraction
        id: check-subtraction-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: subtraction

      - name: Verificar se calculator.js tem função multiplication
        id: check-multiplication-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: multiplication

      - name: Verificar se calculator.js tem função division
        id: check-division-function
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/calculator.js
          keyphrase: division

      - name: Atualizar comentário - resultados do passo
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "A calculadora tem função 'addition'"
                passed: ${{ steps.check-addition-function.outcome == 'success' }}
              - description: "A calculadora tem função 'subtraction'"
                passed: ${{ steps.check-subtraction-function.outcome == 'success' }}
              - description: "A calculadora tem função 'multiplication'"
                passed: ${{ steps.check-multiplication-function.outcome == 'success' }}
              - description: "A calculadora tem função 'division'"
                passed: ${{ steps.check-division-function.outcome == 'success' }}

      - name: Falhar job se nem todas as verificações passaram
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Publicar conteúdo do próximo passo
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Obter templates de resposta
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Criar comentário - passo concluído
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: Criar comentário - adicionar conteúdo do passo
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}

      - name: Criar comentário - monitorando progresso
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Desabilitar workflow atual e habilitar próximo
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Passo 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
